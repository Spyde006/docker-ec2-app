name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: SSH to EC2 and Deploy
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: 40.192.99.6
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd myapp
            git pull origin main
            sudo docker stop $(sudo docker ps -q) || true
            sudo docker rm $(sudo docker ps -aq) || true
            sudo docker build -t himansu-app .
            sudo docker run -d -p 8080:80 himansu-app
